<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form detection — HalfABilAgency</title>
  </head>
  <body>
    <!--
      Static form for Netlify build-time detection.
      Netlify scans deployed HTML for forms with data-netlify="true".
      This file is not linked in navigation; it exists only for form registration.
    -->
    <form
      name="project-request"
      method="POST"
      data-netlify="true"
      netlify-honeypot="bot-field"
      action="/thank-you"
      hidden
    >
      <input type="hidden" name="form-name" value="project-request" />

      <p hidden>
        <label>
          Don&apos;t fill this out:
          <input name="bot-field" />
        </label>
      </p>

      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="businessName" />

      <select name="service">
        <option value="Website Design">Website Design</option>
        <option value="App or MVP">App or MVP</option>
        <option value="Business Automation">Business Automation</option>
        <option value="AI Workflow Setup">AI Workflow Setup</option>
        <option value="Landing Page">Landing Page</option>
        <option value="Digital Cleanup">Digital Cleanup</option>
        <option value="Not Sure Yet">Not Sure Yet</option>
      </select>

      <select name="budget">
        <option value="Under $500">Under $500</option>
        <option value="$500 to $1,500">$500 to $1,500</option>
        <option value="$1,500 to $5,000">$1,500 to $5,000</option>
        <option value="$5,000+">$5,000+</option>
        <option value="Not sure yet">Not sure yet</option>
      </select>

      <select name="timeline">
        <option value="ASAP">ASAP</option>
        <option value="This month">This month</option>
        <option value="Next 30 to 60 days">Next 30 to 60 days</option>
        <option value="Still planning">Still planning</option>
      </select>

      <textarea name="message"></textarea>
    </form>
  </body>
</html>
